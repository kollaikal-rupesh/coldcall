name: Voice Agent Test
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install ColdCall
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest tests/ -v

      - name: Verify CLI loads
        run: uv run coldcall --help

      - name: Verify all scenarios load
        run: uv run coldcall scenarios list

      - name: Verify imports
        run: |
          uv run python -c "
          from coldcall.bot import run_bot
          from coldcall.scenarios import Scenario, list_scenarios
          from coldcall.judge import evaluate
          from coldcall.metrics import compute_metrics
          from coldcall.recorder import CallSession
          from coldcall.humanizer import HumanizerProcessor
          from coldcall.noise import NoiseInjectorProcessor
          from coldcall.report import generate_reports
          from coldcall.config import load_config
          print(f'All imports OK — {len(list_scenarios())} scenarios loaded')
          "

  voice-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'workflow_dispatch'
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install ColdCall
        run: uv sync

      - name: Run voice agent test
        run: |
          uv run coldcall serve \
            --scenario dental-appointment \
            --ci \
            --once \
            --timeout 120 \
            --public-url "$PUBLIC_URL"
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CARTESIA_API_KEY: ${{ secrets.CARTESIA_API_KEY }}
          PUBLIC_URL: ${{ secrets.PUBLIC_URL }}

      - name: Generate reports
        if: always() && hashFiles('results/*/metadata.json') != ''
        run: uv run coldcall report --last

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: voice-test-results
          path: results/
          if-no-files-found: ignore
          retention-days: 30

      - name: Print results summary
        if: always() && hashFiles('results/*/metadata.json') != ''
        run: uv run coldcall results --last --ci
