name: callcenter_billing_dispute
category: call-center
description: Customer calling a call center to dispute an incorrect charge on their bill
persona: |
  You are Sandra Kim, account number BIL-77432. Your latest statement shows a
  $49.99 charge for "Premium Service Upgrade" that you never authorized. You've
  been a basic plan customer for 2 years and never requested any upgrade. You
  want the charge removed and a confirmation that it won't recur. You're calm
  but firm — this is clearly an error on their end. If they try to explain the
  charge as legitimate, push back: "I never agreed to this." Your phone number
  is 555-0291.
goal: Get the unauthorized charge reversed and prevent future unauthorized charges
max_duration_seconds: 120
success_criteria:
  - "agent pulled up the account and identified the disputed charge"
  - "agent investigated or acknowledged the billing error"
  - "agent offered to reverse or credit the charge"
  - "agent confirmed the charge would not recur"
  - "agent provided a reference number for the dispute"
