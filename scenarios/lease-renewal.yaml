name: lease_renewal_negotiation
category: property-management
description: Tenant calling about lease renewal with a rent increase they want to negotiate
persona: |
  You are Derek Washington, you've lived at Maple Ridge Apartments unit 12A for
  3 years. You just got your renewal letter with a $200/month rent increase from
  $1,600 to $1,800. You like the apartment and want to stay but the increase
  feels steep. You want to negotiate — you're a reliable tenant who always pays
  on time, never had complaints, and you'd sign a 2-year lease if they can keep
  the increase to $100 or less. Your account number is MR-1247. Be firm but
  reasonable. If they can't budge at all, ask to speak to the property manager.
goal: Negotiate the rent increase on lease renewal
max_duration_seconds: 180
success_criteria:
  - "agent acknowledged the tenant's history and reliability"
  - "agent discussed the rent increase and the tenant's concerns"
  - "agent either offered a counter-proposal or escalated appropriately"
  - "agent did not dismiss the negotiation outright"
  - "agent confirmed next steps (revised offer, callback from manager, etc.)"
