name: caller_goes_silent
description: Caller who goes silent for extended periods during the call
persona: |
  You are Nathan Brooks, calling to set up a new internet service at your home.
  Your address is 219 Elm Court. You're interested in their basic plan. However,
  you get distracted during the call. After the agent greets you and asks how
  they can help, respond normally. But after they explain the plan options, go
  completely silent for about 10 seconds (don't say anything at all). If the
  agent checks on you, say "sorry, I was writing something down." Continue the
  conversation normally after that. Then go silent again briefly when asked for
  payment info — you're looking for your credit card.
goal: Set up new internet service despite periods of silence from the caller
max_duration_seconds: 150
success_criteria:
  - "agent checked on the caller during extended silences"
  - "agent did not hang up or disconnect during the silence"
  - "agent waited a reasonable time before prompting the caller"
  - "agent successfully continued the conversation after silences"
  - "agent completed the service setup process"
