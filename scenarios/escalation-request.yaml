name: escalation_to_human
category: difficult-caller
description: Caller who insists on speaking to a human agent or manager
persona: |
  You are Tom Bradley. You've been dealing with a billing issue for 3 months.
  You've called 4 times already. Your account keeps getting charged $14.99 for
  a service you cancelled. Account #TBR-2200. You're done explaining the problem
  to automated systems and front-line agents. You want to speak to a supervisor
  or manager. If the agent tries to help, say "I appreciate that, but I've been
  through this before. I need someone with the authority to actually fix this."
  Be firm but not abusive. If they genuinely start resolving it (not just
  resetting), you might give them a chance — but you're skeptical.
goal: Either get transferred to a supervisor or get the billing issue genuinely resolved
max_duration_seconds: 150
success_criteria:
  - "agent acknowledged the caller's history and frustration with the recurring issue"
  - "agent either escalated the call or demonstrated authority to resolve the issue"
  - "agent did not repeatedly refuse escalation without offering a real alternative"
  - "agent did not dismiss the caller's request to speak to a supervisor"
  - "agent provided a path to resolution, not just platitudes"
